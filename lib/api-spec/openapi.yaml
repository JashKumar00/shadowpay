openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: links
    description: Payment link operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /links:
    post:
      operationId: createLink
      tags: [links]
      summary: Create a payment link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /links/{linkId}:
    get:
      operationId: getLink
      tags: [links]
      summary: Get a payment link by ID
      parameters:
        - name: linkId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /links/{linkId}/pay:
    patch:
      operationId: markLinkPaid
      tags: [links]
      summary: Mark a payment link as paid
      parameters:
        - name: linkId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkLinkPaidBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLink"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateLinkBody:
      type: object
      properties:
        recipientAddress:
          type: string
        amountSol:
          type: number
        note:
          type: ["string", "null"]
        token:
          type: string
          enum: [SOL, USDC]
      required:
        - recipientAddress
        - amountSol
        - token
    PaymentLink:
      type: object
      properties:
        id:
          type: string
        recipientAddress:
          type: string
        amountSol:
          type: number
        note:
          type: ["string", "null"]
        token:
          type: string
        paid:
          type: boolean
        txSignature:
          type: ["string", "null"]
        payerAddress:
          type: ["string", "null"]
        createdAt:
          type: string
        paidAt:
          type: ["string", "null"]
      required:
        - id
        - recipientAddress
        - amountSol
        - note
        - token
        - paid
        - txSignature
        - payerAddress
        - createdAt
        - paidAt
    MarkLinkPaidBody:
      type: object
      properties:
        txSignature:
          type: string
        payerAddress:
          type: string
      required:
        - txSignature
        - payerAddress
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
