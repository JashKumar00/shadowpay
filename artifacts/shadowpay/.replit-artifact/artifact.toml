kind = "web"
previewPath = "/"
title = "ShadowPay"
version = "1.0.0"
id = "artifacts/shadowpay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21869

[services.development]
run = "pnpm --filter @workspace/shadowpay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadowpay", "run", "build" ]
publicDir = "artifacts/shadowpay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21869"
BASE_PATH = "/"
